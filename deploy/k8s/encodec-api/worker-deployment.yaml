apiVersion: apps/v1
kind: Deployment
metadata:
  name: encodec-api-worker
  namespace: encodec-api
  labels:
    app.kubernetes.io/name: encodec-api-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: encodec-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: encodec-api-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: encodec-api-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: encodec-api
    spec:
      serviceAccountName: encodec-api
      imagePullSecrets:
        - name: ghcr-wavey-ai
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: wavey.ai/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
                  - key: wavey.ai/gpu-vram-free-ge-3072mib
                    operator: In
                    values:
                      - "true"
      initContainers:
        - name: seed-bundles
          image: ghcr.io/wavey-ai/encodec-api-worker:main
          command:
            - sh
            - -lc
            - |
              set -eu
              src="/opt/encodec-rs/onnx-bundles"
              dst="/var/lib/encodec-api/models/onnx-bundles"
              if [ ! -f "${dst}/encodec_48khz_6kbps/bundle.json" ] || [ ! -f "${dst}/encodec_48khz_12kbps/bundle.json" ]; then
                rm -rf "${dst}"
                mkdir -p "${dst}"
                cp -R "${src}/." "${dst}/"
              fi
          volumeMounts:
            - name: model
              mountPath: /var/lib/encodec-api/models
        - name: verify-bundles
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              set -eu
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_6kbps/bundle.json
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_6kbps/encode_frame.onnx
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_6kbps/decode_frame.onnx
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_6kbps/lm_logits.onnx
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_12kbps/bundle.json
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_12kbps/encode_frame.onnx
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_12kbps/decode_frame.onnx
              test -f /var/lib/encodec-api/models/onnx-bundles/encodec_48khz_12kbps/lm_logits.onnx
          volumeMounts:
            - name: model
              mountPath: /var/lib/encodec-api/models
      containers:
        - name: worker
          image: ghcr.io/wavey-ai/encodec-api-worker:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
          envFrom:
            - configMapRef:
                name: encodec-api-worker-config
          env:
            - name: TLS_CERT_PATH
              value: /var/run/encodec-api/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /var/run/encodec-api/tls/tls.key
          volumeMounts:
            - name: model
              mountPath: /var/lib/encodec-api/models
            - name: tls
              mountPath: /var/run/encodec-api/tls
              readOnly: true
          startupProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "3"
              memory: 6Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: model
          persistentVolumeClaim:
            claimName: encodec-api-model
        - name: tls
          secret:
            secretName: encodec-api-tls
