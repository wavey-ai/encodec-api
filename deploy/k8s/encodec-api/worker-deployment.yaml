apiVersion: apps/v1
kind: Deployment
metadata:
  name: encodec-api-worker
  namespace: encodec-api
  labels:
    app.kubernetes.io/name: encodec-api-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: encodec-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: encodec-api-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: encodec-api-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: encodec-api
    spec:
      serviceAccountName: encodec-api
      imagePullSecrets:
        - name: ghcr-wavey-ai
      terminationGracePeriodSeconds: 120
      tolerations:
        - key: wavey.ai/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
      containers:
        - name: worker
          image: ghcr.io/wavey-ai/encodec-api-worker:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
          envFrom:
            - configMapRef:
                name: encodec-api-worker-config
          env:
            - name: TLS_CERT_PATH
              value: /var/run/encodec-api/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /var/run/encodec-api/tls/tls.key
          volumeMounts:
            - name: tls
              mountPath: /var/run/encodec-api/tls
              readOnly: true
          startupProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: tls
          secret:
            secretName: encodec-api-tls
