apiVersion: apps/v1
kind: Deployment
metadata:
  name: encodec-api-ingress
  namespace: encodec-api
  labels:
    app.kubernetes.io/name: encodec-api-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: encodec-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: encodec-api-ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: encodec-api-ingress
        app.kubernetes.io/component: ingress
        app.kubernetes.io/part-of: encodec-api
    spec:
      serviceAccountName: encodec-api
      imagePullSecrets:
        - name: ghcr-wavey-ai
      terminationGracePeriodSeconds: 120
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: DoesNotExist
      containers:
        - name: ingress
          image: ghcr.io/wavey-ai/encodec-api-ingress:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
          envFrom:
            - configMapRef:
                name: encodec-api-ingress-config
          env:
            - name: TLS_CERT_PATH
              value: /var/run/encodec-api/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /var/run/encodec-api/tls/tls.key
          volumeMounts:
            - name: tls
              mountPath: /var/run/encodec-api/tls
              readOnly: true
          startupProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: tls
          secret:
            secretName: encodec-api-tls
