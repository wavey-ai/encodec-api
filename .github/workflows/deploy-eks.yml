name: Deploy Encodec API to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  packages: read

concurrency:
  group: deploy-encodec-api-main
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ENCODEC_API_NAMESPACE: ${{ vars.ENCODEC_API_NAMESPACE || 'encodec-api' }}
  ENCODEC_API_DOMAIN: ${{ vars.ENCODEC_API_DOMAIN || 'encodec.wavey.ai' }}
  ENCODEC_API_INGRESS_IMAGE_REPO: ghcr.io/wavey-ai/encodec-api-ingress
  ENCODEC_API_WORKER_IMAGE_REPO: ghcr.io/wavey-ai/encodec-api-worker
  ENCODEC_API_KUSTOMIZE_PATH: deploy/k8s/encodec-api
  ENCODEC_API_REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git auth for private dependencies
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${{ secrets.WAVEY_AI_GH_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate deploy artifacts
        run: |
          set -euo pipefail
          cargo metadata --locked --no-deps >/dev/null
          bash -n deploy/eks/manual-deploy.sh
          kubectl kustomize "$ENCODEC_API_KUSTOMIZE_PATH" >/dev/null

      - name: Detect image changes
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "wait_image=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before=""
          fi

          if [ -n "$before" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$before" "$GITHUB_SHA")"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          else
            changed_files="$(git ls-files)"
          fi

          if [ -z "$changed_files" ]; then
            changed_files="$(git show --pretty='' --name-only "$GITHUB_SHA")"
          fi

          wait_image=false
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              .github/workflows/build-image.yml|.dockerignore|docker/*|docker/**|src/*|src/**|Cargo.toml|Cargo.lock)
                wait_image=true
                ;;
            esac
          done <<<"$changed_files"

          echo "wait_image=$wait_image" >> "$GITHUB_OUTPUT"

      - name: Wait for image build workflow
        if: steps.changes.outputs.wait_image == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GH_TOKEN"]
          url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/build-image.yml/runs"
              f"?head_sha={sha}&event=push&per_page=10"
          )
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          deadline = time.time() + 45 * 60

          while time.time() < deadline:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.load(resp)
              runs = payload.get("workflow_runs", [])
              if runs:
                  run = runs[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  print(f"build-image.yml run {run.get('id')} status={status} conclusion={conclusion}")
                  if status == "completed":
                      if conclusion == "success":
                          sys.exit(0)
                      sys.exit(1)
              time.sleep(15)

          sys.exit(1)
          PY

      - name: Deploy encodec-api to EKS
        env:
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
          REGISTRY_SERVER: ${{ env.ENCODEC_API_REGISTRY }}
          REGISTRY_USERNAME: ${{ vars.ENCODEC_API_REGISTRY_USERNAME || 'jbrough' }}
          REGISTRY_PASSWORD: ${{ secrets.WAVEY_AI_GH_TOKEN }}
          ENCODEC_API_INGRESS_REPLICAS: ${{ vars.ENCODEC_API_INGRESS_REPLICAS || '1' }}
          ENCODEC_API_WORKER_REPLICAS: ${{ vars.ENCODEC_API_WORKER_REPLICAS || '1' }}
        run: |
          set -euo pipefail

          ingress_image="${ENCODEC_API_INGRESS_IMAGE_REPO}:main"
          worker_image="${ENCODEC_API_WORKER_IMAGE_REPO}:main"
          if [ "${{ steps.changes.outputs.wait_image }}" = "true" ]; then
            short_sha="${GITHUB_SHA::7}"
            ingress_image="${ENCODEC_API_INGRESS_IMAGE_REPO}:sha-${short_sha}"
            worker_image="${ENCODEC_API_WORKER_IMAGE_REPO}:sha-${short_sha}"
          fi

          ENCODEC_API_INGRESS_IMAGE="$ingress_image" \
          ENCODEC_API_WORKER_IMAGE="$worker_image" \
          bash deploy/eks/manual-deploy.sh
