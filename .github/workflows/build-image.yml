name: Build Encodec API Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-image.yml"
      - ".dockerignore"
      - "docker/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-encodec-api-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out encodec-rs bundles
        uses: actions/checkout@v4
        with:
          repository: wavey-ai/encodec-rs
          token: ${{ secrets.WAVEY_AI_GH_TOKEN }}
          path: encodec-rs
          lfs: true
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: short_sha
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wavey-ai/encodec-api-opus-base
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push opus base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/encodec-api-opus-base.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=encodec-api-opus-base
          cache-to: |
            type=gha,scope=encodec-api-opus-base,mode=max

  build:
    needs: build-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: ingress
            image: ghcr.io/wavey-ai/encodec-api-ingress
            dockerfile: docker/encodec-api-ingress.Dockerfile
            cache_scope: encodec-api-ingress
          - component: worker
            image: ghcr.io/wavey-ai/encodec-api-worker
            dockerfile: docker/encodec-api-worker.Dockerfile
            cache_scope: encodec-api-worker
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Compute short SHA
        id: short_sha
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: |
            OPUS_BASE_IMAGE=ghcr.io/wavey-ai/encodec-api-opus-base:sha-${{ steps.short_sha.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.cache_scope }}
          cache-to: |
            type=gha,scope=${{ matrix.cache_scope }},mode=max
          build-contexts: |
            encodec_rs=./encodec-rs
          secrets: |
            github_token=${{ secrets.WAVEY_AI_GH_TOKEN }}
